<app-lab-demo-layout
  experimentSlug="circular-navigation"
  (onReset)="reset()"
  (onParamChange)="onParamChange($event)"
  (onDrawDebug)="drawDebug($event)">

  <div
    scene
    #sceneHost
    class="circular-navigation js-lab-scene"
    data-debug-vars="--ring-radius --ring-angle --active-scale"
  >
    <div class="circular-navigation__stage">
      <div class="circular-navigation__ring" #ringHost [style.transform]="'rotate(' + currentAngle + 'deg)'">
        @for (item of items; track item.label; let i = $index) {
          <button
            type="button"
            class="circular-navigation__item"
            [class.circular-navigation__item--active]="activeIndex === i"
            [style]="getItemStyle(i)"
            (click)="selectItem(i)"
          >
            <span class="circular-navigation__icon" aria-hidden="true">{{ item.icon }}</span>
          </button>
        }
      </div>

      <div class="circular-navigation__center">
        <span class="circular-navigation__active-icon" aria-hidden="true">{{ items[activeIndex].icon }}</span>
        <span class="circular-navigation__active-label">{{ items[activeIndex].label }}</span>
      </div>
    </div>

    <p class="circular-navigation__hint">// click ring items to rotate</p>
  </div>
</app-lab-demo-layout>
