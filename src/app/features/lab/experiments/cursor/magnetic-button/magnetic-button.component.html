<app-lab-demo-layout 
  experimentSlug="magnetic-button" 
  (onReset)="reset()"
  (onParamChange)="onParamChange($event)"
  (onDrawDebug)="drawDebug($event)">
  
  <div scene #sceneHost class="js-lab-scene js-lab-magnetic" style="width: 100%; height: 100%; position: absolute; inset: 0;">
    <div class="magnetic">
      <button appButton
        class="magnetic__item magnetic__item--minor js-magnetic-item"
        type="button"
        data-radius="110"
        data-strength="0.4"
      >
        <span class="magnetic__label">PULL</span>
      </button>

      <button appButton [primary]="true"
        class="magnetic__item magnetic__item--major js-magnetic-item"
        type="button"
        #majorBtn
        data-radius="170"
        data-strength="0.5"
        data-debug-vars="--mx --my"
      >
        <span class="magnetic__label">HOVER ME</span>
      </button>

      <button appButton
        class="magnetic__item magnetic__item--minor js-magnetic-item"
        type="button"
        data-radius="110"
        data-strength="0.4"
      >
        <span class="magnetic__label">ME TOO</span>
      </button>
    </div>

    <p class="magnetic__hint">// move cursor around the buttons</p>
  </div>
</app-lab-demo-layout>
