<app-layout [page]="true">
  <ng-container header>
    <app-header></app-header>
  </ng-container>

  <ng-container main>
    @if (category()) {
      <section class="lab">
        <app-breadcrumbs [items]="[
          { label: 'Home', url: '/' },
          { label: 'THE.LAB', url: '/lab' },
          { label: category()!.title }
        ]"></app-breadcrumbs>

        <app-lab-category
          [id]="'lab-' + categorySlug()"
          [index]="'01'"
          [title]="category()!.title"
          [count]="readyCount() + ' / ' + experiments().length"
          [description]="category()!.description">
          <app-lab-carousel [experiments]="experiments()"></app-lab-carousel>
        </app-lab-category>
      </section>
    }
  </ng-container>
</app-layout>
