@if (control(); as ctrl) {
  <div class="debug-control">
    <div class="debug-control__head">
      <span class="debug-control__label">{{ ctrl.label }}</span>
      <span class="debug-control__value">{{ formatControlValue(controlValue(), ctrl.step) }}</span>
    </div>
    @if (ctrl.description) {
      <p class="debug-control__desc">{{ ctrl.description }}</p>
    }
    <input class="debug-control__range" type="range"
           [min]="ctrl.min" [max]="ctrl.max" [step]="ctrl.step"
           [value]="controlValue()"
           [attr.aria-label]="ctrl.label"
           (input)="onInput($event)">
  </div>
}
