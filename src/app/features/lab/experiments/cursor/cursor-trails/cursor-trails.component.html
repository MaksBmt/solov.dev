<app-lab-demo-layout
  experimentSlug="cursor-trails"
  [isImmersive]="true"
  (onReset)="reset()"
  (onParamChange)="onParamChange($event)"
  (onDrawDebug)="drawDebug($event)">

  <div scene #sceneHost class="js-lab-scene js-lab-trails-scene" style="width: 100%; height: 100%; position: absolute; inset: 0;">
    <div class="trails js-trails" data-debug-vars="--particles">
      <canvas class="trails__canvas js-trails-canvas" aria-hidden="true"></canvas>
    </div>

    <p class="trails__hint">// move the cursor — particles fade into a trail</p>
  </div>
</app-lab-demo-layout>
