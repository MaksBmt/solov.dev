<app-lab-demo-layout
  experimentSlug="text-trails"
  [isImmersive]="true"
  (onReset)="reset()"
  (onParamChange)="onParamChange($event)"
  (onDrawDebug)="drawDebug($event)">

  <div scene #sceneHost class="text-trails js-lab-scene" style="width: 100%; height: 100%; position: absolute; inset: 0;">
    <div class="text-trails__stage js-text-trails" data-debug-vars="--glyph-count">
      <canvas class="text-trails__canvas js-text-trails-canvas" aria-hidden="true"></canvas>

      <div class="text-trails__hero">
        <p class="text-trails__eyebrow">canvas · glyph particles</p>
        <h2 class="text-trails__title">TEXT<br>TRAILS</h2>
      </div>
    </div>

    <p class="text-trails__hint">// рисуйте курсором — буквы оставляют след</p>
  </div>
</app-lab-demo-layout>
