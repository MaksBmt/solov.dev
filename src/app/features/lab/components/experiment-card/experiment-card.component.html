@if (experiment(); as exp) {
  <article class="experiment-card" [class.experiment-card--soon]="exp.status !== 'ready'">
    @if (exp.status === 'ready') {
      <a class="experiment-card__link" [routerLink]="['/lab', exp.category, exp.slug]">
        <div class="experiment-card__head">
          <h3 class="experiment-card__title">{{ exp.title }}</h3>
          <span class="experiment-card__cta">→</span>
        </div>
        <p class="experiment-card__description">{{ exp.description }}</p>
      </a>
    } @else {
      <div class="experiment-card__head">
        <h3 class="experiment-card__title">{{ exp.title }}</h3>
        <span class="experiment-card__badge experiment-card__badge--soon">SOON</span>
      </div>
      <p class="experiment-card__description">{{ exp.description }}</p>
    }

    <app-difficulty class="experiment-card__meta difficulty" [difficulty]="exp.difficulty"></app-difficulty>

    <app-tech-tags [tags]="exp.tech"></app-tech-tags>
  </article>
}
