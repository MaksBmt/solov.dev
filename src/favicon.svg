<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    :root {
      --brand-color: #00f0ff;    /* Неоновый голубой */
      --accent-color: #ff007f;   /* Розовый неон для акцентов */
      --bg-color: #0a0e17;       /* Темный фон */
    }
    
    /* Адаптация под светлую тему ОС пользователя */
    @media (prefers-color-scheme: light) {
      :root {
        --brand-color: #0066cc;
        --accent-color: #d80064;
        --bg-color: #ffffff;
      }
    }

    /* Анимация плавного «дыхания» тега */
    .code-tag {
      transform-origin: 16px 16px;
      animation: breathe 3s infinite ease-in-out;
      stroke: var(--brand-color);
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 1px var(--brand-color)); }
    }

    /* Анимация «мерцания» курсора или центральной точки лаборатории */
    .lab-dot {
      fill: var(--accent-color);
      animation: blink 1.5s infinite ease-in-out;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    /* Вращение орбиты вокруг тега (символ интерактива и технологий) */
    .orbit {
      stroke: var(--accent-color);
      stroke-dasharray: 4 8;
      transform-origin: 16px 16px;
      animation: spin 8s infinite linear;
      opacity: 0.6;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>

  <rect width="32" height="32" rx="6" fill="var(--bg-color)" />

  <circle cx="16" cy="16" r="13" class="orbit" stroke-width="1.5" fill="none" />

  <g class="code-tag" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M11 11 L5 16 L11 21" />
    <path d="M19 8 L13 24" stroke-width="2" />
    <path d="M21 11 L27 16 L21 21" />
  </g>

  <circle cx="16" cy="16" r="2" class="lab-dot" transform-origin="16px 16px" />
</svg>
