<app-lab-demo-layout
  experimentSlug="mouse-distortion"
  [isImmersive]="true"
  (onReset)="reset()"
  (onParamChange)="onParamChange($event)"
  (onDrawDebug)="drawDebug($event)">

  <div scene #sceneHost class="mouse-distortion js-lab-scene" style="width: 100%; height: 100%; position: absolute; inset: 0;">
    <svg class="mouse-distortion__defs" width="0" height="0" aria-hidden="true" focusable="false">
      <defs>
        <filter id="typo-distort" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
          <feImage class="js-typo-distort-feimage" href="" result="map" preserveAspectRatio="none" />
          <feDisplacementMap
            in="SourceGraphic"
            in2="map"
            [attr.scale]="distortScale"
            xChannelSelector="R"
            yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <canvas class="mouse-distortion__map js-typo-distort-map" aria-hidden="true"></canvas>

    <div class="mouse-distortion__stage js-typo-distort" data-debug-vars="--dx --dy --dr">
      <p class="mouse-distortion__eyebrow">feDisplacementMap · typography</p>
      <h2 class="mouse-distortion__title">WARP<br><span>TYPE</span></h2>
      <p class="mouse-distortion__sub">letters bend like liquid glass</p>
    </div>

    <p class="mouse-distortion__hint">// двигайте курсор — линза искажает буквы</p>
  </div>
</app-lab-demo-layout>
